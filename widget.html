<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Anti-Fraud Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/@livechat/agent-app-sdk@2.1.2/livechat-agent-app-sdk.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; padding: 12px; margin: 0; background: #fff; font-size: 13px; }
        .status-box { padding: 11px 14px; border-radius: 8px; font-weight: bold; font-size: 13px; text-align: center; color: white; background: #95a5a6; }
        .status-clean  { background: #27ae60 !important; }
        .status-danger { background: #e74c3c !important; animation: pulse 1.2s ease-in-out infinite; }
        .status-error  { background: #e67e22 !important; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.82} }
        .info-box { margin-top: 8px; background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 6px; padding: 9px 11px; font-size: 11px; color: #555; line-height: 1.8; }
        .info-box b { color: #333; }
        .danger-box { margin-top: 8px; background: #fff5f5; border: 1px solid #fcc; border-radius: 6px; padding: 9px 11px; display:none; }
        .danger-title { color: #c0392b; font-weight: bold; font-size: 12px; margin-bottom: 5px; }
        .danger-list { padding-left: 15px; margin: 0; }
        .danger-list li { color: #333; margin-bottom: 3px; font-size: 12px; }
        .debug { margin-top: 8px; padding: 8px 10px; background: #111; color: #0f0; border-radius: 5px; font-size: 10px; font-family: monospace; white-space: pre-wrap; word-break: break-all; min-height: 60px; max-height: 200px; overflow-y: auto; }
        button { margin-top: 8px; width: 100%; padding: 8px; background: #3498db; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
        button:active { background: #2980b9; }
    </style>
</head>
<body>

<div id="status-box" class="status-box">Yükleniyor...</div>
<div id="info-box" class="info-box" style="display:none"></div>
<div id="danger-box" class="danger-box">
    <div class="danger-title">Bu cihazla bağlantılı hesaplar:</div>
    <ul id="danger-list" class="danger-list"></ul>
</div>
<button onclick="manuelSorgu()">Manuel Sorgula</button>
<div id="debug" class="debug">Başlatılıyor...\n</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDnReWZJ3NyU5iLUE2mmNxjRq45g3zpvIE",
        authDomain: "anti-fraud-system-sj.firebaseapp.com",
        projectId: "anti-fraud-system-sj",
        storageBucket: "anti-fraud-system-sj.firebasestorage.app",
        messagingSenderId: "1058527069626",
        appId: "1:1058527069626:web:39ca3407412267287a0983"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let widgetRef = null;

    function log(msg) {
        const el = document.getElementById('debug');
        el.innerText += '[' + new Date().toLocaleTimeString() + '] ' + msg + '\n';
        el.scrollTop = el.scrollHeight;
        console.log('[AF]', msg);
    }

    function setStatus(cls, msg) {
        const el = document.getElementById('status-box');
        el.className = 'status-box ' + cls;
        el.innerText = msg;
    }

    function showInfo(data) {
        const el = document.getElementById('info-box');
        el.style.display = 'block';
        el.innerHTML = Object.entries(data).map(([k,v]) => '<b>' + k + ':</b> ' + (v||'—')).join('<br>');
    }

    async function sorgulaFirebase(deviceId, username) {
        const ref = db.collection("devices").doc(deviceId);
        await ref.set({
            users: firebase.firestore.FieldValue.arrayUnion(username),
            lastSeen: new Date()
        }, { merge: true });
        const doc = await ref.get();
        const users = (doc.data() && doc.data().users) || [];
        const digerler = users.filter(u => u !== username);
        if (digerler.length > 0) {
            setStatus('status-danger', '🚨 TEHLİKE: ' + users.length + ' hesap!');
            document.getElementById('danger-box').style.display = 'block';
            document.getElementById('danger-list').innerHTML = users.map(u =>
                '<li>' + u + (u === username ? ' <em style="color:#888">(şu anki)</em>' : '') + '</li>'
            ).join('');
        } else {
            setStatus('status-clean', '✓ Temiz — başka hesap yok');
            document.getElementById('danger-box').style.display = 'none';
        }
    }

    function isleProfil(profile) {
        if (!profile) { log('profile null/undefined'); return; }
        log('Profile geldi, parse ediliyor...');

        // RAW dump — hangi key'lerin dolu olduğunu görelim
        try {
            const keys = Object.keys(profile);
            log('Keys: ' + keys.join(', '));
            // Önemli alanları logla
            if (profile.name) log('name: ' + profile.name);
            if (profile.email) log('email: ' + profile.email);
            if (profile.id) log('id: ' + profile.id);
            if (profile.variables) log('variables: ' + JSON.stringify(profile.variables));
            if (profile.customVariables) log('customVariables: ' + JSON.stringify(profile.customVariables));
            if (profile.geolocation) log('geo.ip: ' + profile.geolocation.ip);
            if (profile.chat) log('chat keys: ' + Object.keys(profile.chat).join(', '));
        } catch(e) { log('parse hata: ' + e.message); }

        // Username çıkar
        let username =
            (profile.variables && profile.variables.username) ||
            (profile.customVariables && Array.isArray(profile.customVariables) &&
                (profile.customVariables.find(v => v.key==='username'||v.name==='username')||{}).value) ||
            profile.name || profile.email || profile.id || null;

        // Device ID çıkar
        let deviceId =
            (profile.variables && profile.variables.device_id) ||
            (profile.customVariables && Array.isArray(profile.customVariables) &&
                (profile.customVariables.find(v => v.key==='device_id'||v.name==='device_id')||{}).value) ||
            null;

        const ip = (profile.geolocation && profile.geolocation.ip) || null;
        if (!deviceId && ip) deviceId = 'ip_' + ip.replace(/[\.\:]/g, '_');
        if (!deviceId) deviceId = 'ua_' + btoa(navigator.userAgent).substring(0, 28);

        log('username=' + username + ' deviceId=' + (deviceId||'').substring(0,20));
        showInfo({ Kullanıcı: username, 'Cihaz ID': deviceId ? deviceId.substring(0,20)+'...' : null, IP: ip });

        if (!username) { setStatus('status-error', 'Username alınamadı'); return; }

        setStatus('', 'Sorgulanıyor...');
        sorgulaFirebase(deviceId, username).catch(e => {
            setStatus('status-error', 'Firebase hata');
            log('Firebase: ' + e.message);
        });
    }

    // Manuel sorgu butonu — widget dışında test için
    function manuelSorgu() {
        if (widgetRef) {
            log('Manuel: widget.get() çağrılıyor...');
            widgetRef.get('customer_profile').then(p => {
                log('Manuel get() sonucu: ' + (p ? 'var' : 'null'));
                isleProfil(p);
            }).catch(e => log('Manuel get() hata: ' + e.message));
        } else {
            log('Widget henüz init olmadı!');
        }
    }

    // SDK init
    log('LiveChat SDK yükleniyor...');
    log('SDK version check: ' + (typeof LiveChat));

    LiveChat.init({ clientId: 'c5764f84a28fee4c14e289af6afdf9ae' })
        .then(widget => {
            widgetRef = widget;
            log('SDK INIT OK!');
            setStatus('', 'Müşteri bekleniyor...');

            widget.get('customer_profile').then(p => {
                log('get() tamamlandı: ' + (p ? 'profil var' : 'null'));
                if (p) isleProfil(p);
            }).catch(e => log('get() hata: ' + e.message));

            widget.on('customer_profile', p => {
                log('EVENT: customer_profile geldi');
                isleProfil(p);
            });
        })
        .catch(err => {
            log('SDK INIT HATA: ' + err.message);
            setStatus('status-error', 'SDK bağlanamadı: ' + err.message);
        });
</script>
</body>
</html>
